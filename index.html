<!DOCTYPE html>
<html lang="de">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <meta name="description" content="FiSi-Quiz – Prüfungstrainer für die Abschlussprüfung Fachinformatiker (AP1 + AP2) mit über 400 Fragen und unbegrenzt generierten Rechenaufgaben.">
  <title>FiSi-Quiz · AP1 + AP2 Prüfungstrainer</title>
  <link rel="stylesheet" href="styles.css">
</head>
<body>
  <main class="wrap">
    <header>
      <h1 class="title">FiSi-Quiz</h1>
      <p class="sub" id="sub">Prüfungstrainer · AP1 + AP2</p>
    </header>

    <!-- Das gesamte Quiz-UI wird per JavaScript in dieses Element gerendert -->
    <div id="screen"></div>

    <!-- noscript-Hinweis, falls JavaScript deaktiviert ist -->
    <noscript>
      <p style="margin-top:16px;color:#dc2626;">
        Dieses Quiz benötigt JavaScript. Bitte aktiviere JavaScript in deinem Browser.
      </p>
    </noscript>
  </main>

  <!-- ES-Module: brauchen einen Webserver (z. B. GitHub Pages). Per Doppelklick (file://) läuft es nicht. -->
  <script type="module" src="main.js"></script>
</body>
</html>
